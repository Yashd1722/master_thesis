# =============================================================================
#  config.yaml
#  Master thesis — Early Warning Signals for Mediterranean Sapropel Transitions
#  Single source of truth. Every script reads ONLY from here.
# =============================================================================

project:
  name:   "early_warning_signals_thesis"
  author: "Yash Dhameliya"
  seed:   42

# =============================================================================
#  PATHS
# =============================================================================
paths:
  ts_500:         "dataset/ts_500/"
  ts_1500:        "dataset/ts_1500/"
  pangaea_raw:    "dataset/pangaea_923197/"
  pangaea_clean:  "dataset/pangaea_923197/datasets/clean_dataset/"
  checkpoints:    "checkpoints/"
  results:        "results/"          # {model}_{dataset}_{metric}/ folders live here
  logs:           "logs/"

# =============================================================================
#  RESULTS FOLDER NAMING
#  Each experiment saves to: results/{model}_{dataset}_{metric}/
#  Contains: result.json  +  *.png plots
# =============================================================================
naming:
  experiment_dir:   "{model}_{dataset}_{metric}"
  result_file:      "result.json"
  checkpoint_dl:    "{model}_{dataset}_v{variant}_best.ckpt"
  checkpoint_tsc:   "{model}_{dataset}_best.pkl"
  slurm_out:        "logs/slurm_{model}_{dataset}_%j.out"
  slurm_err:        "logs/slurm_{model}_{dataset}_%j.err"

# =============================================================================
#  DATASETS
# =============================================================================
datasets:

  ts_500:
    path_key:    "ts_500"
    ts_length:   500
    num_classes: 4
    class_names: ["fold", "hopf", "transcritical", "null"]
    train_frac:  0.95
    val_frac:    0.04
    test_frac:   0.01

  ts_1500:
    path_key:    "ts_1500"
    ts_length:   1500
    num_classes: 4
    class_names: ["fold", "hopf", "transcritical", "null"]
    train_frac:  0.95
    val_frac:    0.04
    test_frac:   0.01

# =============================================================================
#  PANGAEA EMPIRICAL DATA
# =============================================================================
pangaea:
  variable:            "Mo"
  bandwidth_years:     400
  rolling_window_frac: 0.50

  cores:
    MS21:
      n_events: 2
      sapropels:
