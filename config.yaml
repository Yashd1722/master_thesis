          role: "train"
          neutral_start: -27.0
          neutral_end: -25.0
          pretrans_start: -25.0
          pretrans_end: -22.5
          transition_kyr: -22.5
        - id: "S1"
          role: "test"
          neutral_start: -17.0
          neutral_end: -15.0
          pretrans_start: -15.0
          pretrans_end: -11.5
          transition_kyr: -11.5

    MS66:
      n_events: 4
      sapropels:
        - id: "S5"
          role: "train"
          neutral_start: -60.0
          neutral_end: -57.0
          pretrans_start: -57.0
          pretrans_end: -54.0
          transition_kyr: -54.0
        - id: "S4"
          role: "train"
          neutral_start: -45.0
          neutral_end: -42.0
          pretrans_start: -42.0
          pretrans_end: -39.0
          transition_kyr: -39.0
        - id: "S3"
          role: "test"
          neutral_start: -27.0
          neutral_end: -25.0
          pretrans_start: -25.0
          pretrans_end: -22.5
          transition_kyr: -22.5
        - id: "S1"
          role: "test"
          neutral_start: -17.0
          neutral_end: -15.0
          pretrans_start: -15.0
          pretrans_end: -11.5
          transition_kyr: -11.5

    64PE406E1:
      n_events: 7
      sapropels:
        - id: "S9"
          role: "train"
          neutral_start: -110.0
          neutral_end: -107.0
          pretrans_start: -107.0
          pretrans_end: -104.0
          transition_kyr: -104.0
        - id: "S8"
          role: "train"
          neutral_start: -95.0
          neutral_end: -92.0
          pretrans_start: -92.0
          pretrans_end: -89.0
          transition_kyr: -89.0
        - id: "S7"
          role: "train"
          neutral_start: -80.0
          neutral_end: -77.0
          pretrans_start: -77.0
          pretrans_end: -74.0
          transition_kyr: -74.0
        - id: "S6"
          role: "test"
          neutral_start: -65.0
          neutral_end: -62.0
          pretrans_start: -62.0
          pretrans_end: -59.0
          transition_kyr: -59.0
        - id: "S5"
          role: "test"
          neutral_start: -60.0
          neutral_end: -57.0
          pretrans_start: -57.0
          pretrans_end: -54.0
          transition_kyr: -54.0
        - id: "S4"
          role: "test"
          neutral_start: -45.0
          neutral_end: -42.0
          pretrans_start: -42.0
