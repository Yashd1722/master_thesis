project:
  name: "early_warning_signals_thesis"
  author: "Yash Dhameliya"
  seed: 42

paths:
  ts_500: "dataset/ts_500/"
  ts_1500: "dataset/ts_1500/"
  processed_dir: "dataset/processed/"
  pangaea_raw: "dataset/pangaea_923197/"
  pangaea_clean: "dataset/pangaea_923197/datasets/clean_dataset/"
  checkpoints: "checkpoints/"
  results: "results/"
  logs: "logs/"

naming:
  experiment_dir: "{model}_{dataset}_{metric}"
  result_file: "result.json"
  checkpoint_dl: "{model}_{dataset}_v{variant}_best.ckpt"
  checkpoint_tsc: "{model}_{dataset}_best.pkl"

datasets:
  ts_500: {path_key: "ts_500", ts_length: 500, num_classes: 4, class_names: ["fold", "hopf", "transcritical", "null"], train_frac: 0.95, val_frac: 0.04, test_frac: 0.01}
  ts_1500: {path_key: "ts_1500", ts_length: 1500, num_classes: 4, class_names: ["fold", "hopf", "transcritical", "null"], train_frac: 0.95, val_frac: 0.04, test_frac: 0.01}

pangaea:
  variable: "Mo"
  # Gaussian detrend bandwidth as a fraction of the record length.
  # Bury compute_ews.py uses 0.2 (the value applied to the residuals fed to
  # classifiers). This is applied identically to forced and AR(1) null series.
  detrend_bandwidth_frac: 0.20
  rolling_window_frac: 0.50
  cores:
    MS21:
      n_events: 2
      sapropels:
        - {id: "S3", role: "train", neutral_start: -27.0, neutral_end: -25.0, pretrans_start: -25.0, pretrans_end: -22.5, transition_kyr: -22.5}
        - {id: "S1", role: "test", neutral_start: -17.0, neutral_end: -15.0, pretrans_start: -15.0, pretrans_end: -11.5, transition_kyr: -11.5}
    MS66:
      n_events: 4
      sapropels:
        - {id: "S5", role: "train", neutral_start: -60.0, neutral_end: -57.0, pretrans_start: -57.0, pretrans_end: -54.0, transition_kyr: -54.0}
        - {id: "S4", role: "train", neutral_start: -45.0, neutral_end: -42.0, pretrans_start: -42.0, pretrans_end: -39.0, transition_kyr: -39.0}
        - {id: "S3", role: "test", neutral_start: -27.0, neutral_end: -25.0, pretrans_start: -25.0, pretrans_end: -22.5, transition_kyr: -22.5}
        - {id: "S1", role: "test", neutral_start: -17.0, neutral_end: -15.0, pretrans_start: -15.0, pretrans_end: -11.5, transition_kyr: -11.5}
    64PE406E1:
      n_events: 7
      sapropels:
        - {id: "S9", role: "train", neutral_start: -110.0, neutral_end: -107.0, pretrans_start: -107.0, pretrans_end: -104.0, transition_kyr: -104.0}
        - {id: "S8", role: "train", neutral_start: -95.0, neutral_end: -92.0, pretrans_start: -92.0, pretrans_end: -89.0, transition_kyr: -89.0}
        - {id: "S7", role: "train", neutral_start: -80.0, neutral_end: -77.0, pretrans_start: -77.0, pretrans_end: -74.0, transition_kyr: -74.0}
        - {id: "S6", role: "test", neutral_start: -65.0, neutral_end: -62.0, pretrans_start: -62.0, pretrans_end: -59.0, transition_kyr: -59.0}
        - {id: "S5", role: "test", neutral_start: -60.0, neutral_end: -57.0, pretrans_start: -57.0, pretrans_end: -54.0, transition_kyr: -54.0}
        - {id: "S4", role: "test", neutral_start: -45.0, neutral_end: -42.0, pretrans_start: -42.0, pretrans_end: -39.0, transition_kyr: -39.0}
        - {id: "S3", role: "test", neutral_start: -27.0, neutral_end: -25.0, pretrans_start: -25.0, pretrans_end: -22.5, transition_kyr: -22.5}

models:
  # n_jobs is NOT hardcoded here — train.py reads SLURM_CPUS_PER_TASK at runtime
  # and injects it into every model call. These entries only set model-specific
  # hyperparameters that do NOT change with the HPC allocation.
  tsc: [minirocket, multirocket, arsenal, hydra_multirocket, rdst, weasel2, drcif, rocket]
  dl:  [cnn_lstm, lstm, inceptiontime]

training:
  # DL models — PyTorch training loop in train.py
  cnn_lstm:
    epochs: 1500
    lr: 0.0005
    batch_size: 256
    patience: 50
    pad_variants: [1, 2]    # two input variants for ensembling at eval time
    weight_decay: 0.0
    grad_clip: 1.0
    optimizer: "adam"
    scheduler: "reduce_on_plateau"
    scheduler_patience: 20
    scheduler_factor: 0.5
    min_lr: 0.000001

  lstm:
    epochs: 300
    lr: 0.001
    batch_size: 128
    patience: 20
    pad_variants: [1]
    weight_decay: 0.0
    grad_clip: 1.0
    optimizer: "adam"
    scheduler: "none"
    min_lr: 0.000001

  inceptiontime:
    epochs: 500
    lr: 0.001
    batch_size: 256
    patience: 30
    pad_variants: [1]
    weight_decay: 0.0001
    grad_clip: 1.0
    optimizer: "adam"
    scheduler: "reduce_on_plateau"
    scheduler_patience: 10
    scheduler_factor: 0.5
    min_lr: 0.000001

  # TSC models — aeon classifiers; n_jobs is overridden at runtime by N_JOBS
  rocket:           {n_kernels: 10000}
  minirocket:       {n_kernels: 10000}
  multirocket:      {n_kernels: 6250}
  arsenal:          {num_kernels: 2000}
  hydra_multirocket: {n_kernels: 6250, n_groups: 64}
  rdst:             {max_shapelets: 10000}
  weasel2:          {}
  drcif:            {n_estimators: 100}

inference:
  rolling_window_frac: 0.50   # CSD rolling window as fraction of record length (Bury rw=0.5)
  prediction_steps: 40         # Number of rolling-window positions to classify
  roc_start_frac: {default: 0.60, MS21: 0.60, MS66: 0.60, 64PE406E1: 0.60}
  end_frac: 1.00
  n_null_series: 10            # AR(1) surrogates per forced series (Bury uses 10)
  null_method: "AR1"           # Primary: AR1 (Bury parity). AAFT is optional/off.
  ar1_fit_fraction: 0.20       # Fit AR(1) to first 20% of series (neutral reference period)
  use_4channel: false          # EWS feature augmentation (default OFF; see Phase 3)
